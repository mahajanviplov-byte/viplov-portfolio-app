<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <style>
    body{margin:0;font-family:Inter,system-ui,sans-serif;background:linear-gradient(180deg,#050816,#0b1022);color:#f6f8ff;display:grid;place-items:center;min-height:100vh}
    .card{width:min(420px,calc(100% - 32px));padding:32px;border-radius:24px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);box-shadow:0 24px 80px rgba(0,0,0,.35)}
    h1{margin:0 0 8px;font-size:32px}.muted{color:#aeb8da;margin-bottom:20px}
    label{display:block;margin:14px 0 8px;font-size:14px;color:#d5dcf7}
    input{width:100%;padding:14px 16px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff}
    button{width:100%;margin-top:18px;padding:14px 16px;border:none;border-radius:999px;background:linear-gradient(135deg,#7c8dff,#9b72ff,#ff8dd8);color:#fff;font-weight:700;cursor:pointer}
    .flash{margin-bottom:12px;padding:10px 12px;border-radius:12px;background:rgba(255,120,120,.12);border:1px solid rgba(255,120,120,.28)}
  </style>
</head>
<body>
  <form class="card" method="post">
    <h1>Admin</h1>
    <div class="muted">Sign in to manage portfolio content and uploads.</div>
    {% with messages = get_flashed_messages() %}{% if messages %}<div class="flash">{{ messages[0] }}</div>{% endif %}{% endwith %}
    <label>ID</label>
    <input name="user_id" type="text" required />
    <label>Password</label>
    <input name="password" type="password" required />
    <button type="submit">Login</button>
  </form>
</body>
</html>
